<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInBottom {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .slide-in-left { animation: slideInLeft 0.6s forwards; }
        .slide-in-right { animation: slideInRight 0.6s forwards; }
        .slide-in-bottom { animation: slideInBottom 0.6s forwards; }
        .hidden { opacity: 0; }
    </style>
</head>
<body>
    <div class="service-card hidden">Service Card 1</div>
    <div class="service-card hidden">Service Card 2</div>
    <div class="news-section hidden">News Section 1</div>
    <div class="news-section hidden">News Section 2</div>
    <div class="hero-content hidden">Hero Content</div>

    <script>
        const options = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const target = entry.target;
                    if (target.classList.contains('service-card')) {
                        target.classList.remove('hidden');
                        target.classList.add('slide-in-left');
                    } else if (target.classList.contains('news-section')) {
                        target.classList.remove('hidden');
                        target.classList.add('slide-in-right');
                    } else if (target.classList.contains('hero-content')) {
                        target.classList.remove('hidden');
                        target.classList.add('slide-in-bottom');
                    }
                    observer.unobserve(target);
                }
            });
        }, options);

        document.querySelectorAll('.hidden').forEach((element, index) => {
            observer.observe(element);
            setTimeout(() => {
                element.classList.remove('hidden');
            }, index * 200); // staggered timing
        });
    </script>
</body>
</html>
